<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CRM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- 🔹 SIDEBAR -->
  <aside class="sidebar">
    <h2>CRM</h2>
    <button onclick="filterStatus('all')">Все</button>
    <button onclick="filterStatus('new')">Новые</button>
    <button onclick="filterStatus('progress')">В работе</button>
    <button onclick="filterStatus('done')">Закрытые</button>
  </aside>

  <!-- 🔹 MAIN -->
  <main class="main">

    <!-- 🔹 HEADER -->
    <header class="header">
      <input type="text" id="search" placeholder="Поиск..." />
      <div>
        <button id="themeToggle">🌙</button>
        <button id="addBtn">+ Добавить</button>
      </div>
    </header>

    <!-- 🔹 CONTENT -->
    <section class="content">

      <!-- 🔹 TABLE -->
      <div class="table">
        <div class="table-header">
          <span>Имя</span>
          <span>Телефон</span>
          <span>Статус</span>
          <span>Действия</span>
        </div>

        <div id="clientList"></div>
      </div>

    </section>

  </main>
</div>

<!-- 🔹 MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <form id="clientForm">
      <h3>Клиент</h3>

      <input type="text" id="name" placeholder="Имя" required />
      <input type="text" id="phone" placeholder="Телефон" required />

      <select id="status">
        <option value="new">Новый</option>
        <option value="progress">В работе</option>
        <option value="done">Закрыт</option>
      </select>

      <button type="submit">Сохранить</button>
    </form>

  </div>
</div>

<!-- 🔹 TOAST -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>CRM</h2>
    <nav>
      <button>Клиенты</button>
      <button>Заявки</button>
      <button>Аналитика</button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="header">
      <input type="text" id="search" placeholder="Поиск..." />
      <button id="addBtn">+ Добавить клиента</button>
    </header>

    <!-- Content -->
    <section class="content">

      <!-- Форма -->
      <div class="form-container hidden" id="formContainer">
        <form id="clientForm">
          <input type="text" id="name" placeholder="Имя" required />
          <input type="text" id="phone" placeholder="Телефон" required />

          <select id="status">
            <option value="new">Новый</option>
            <option value="progress">В работе</option>
            <option value="done">Закрыт</option>
          </select>

          <button type="submit">Сохранить</button>
        </form>
      </div>

      <!-- Таблица -->
      <div class="table">
        <div class="table-header">
          <span>Имя</span>
          <span>Телефон</span>
          <span>Статус</span>
          <span>Действия</span>
        </div>

        <div id="clientList"></div>
      </div>

    </section>

  </main>
</div>
<script src="app.js"></script>
</body>


</html>
